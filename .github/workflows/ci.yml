name: CI - Main quality gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PYTHONHASHSEED: "0"

    steps:
      - name: Obter o código-fonte
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Instalar dependências do CI e o pacote
        run: |
          python -m pip install --upgrade pip
          python -m pip install --requirement requirements-ci.txt
          python -m pip install --no-deps --editable .
          python -m pip check

      - name: Validar sintaxe Python
        run: python -m compileall -q src tests

      - name: Validar configuração do Docker Compose
        run: docker compose config --quiet

      - name: Construir imagem de inferência
        run: docker build --file docker/api/Dockerfile --tag obesity-risk/inference-api:ci .

      - name: Executar testes unitários
        run: python -m pytest -q tests/unit
